url: https://fastcpd.xingchi.li

template:
  bootstrap: 5
  bslib:
    preset: "flatly"
    primary: "#4f46e5"
    secondary: "#0891b2"
    base_font: { google: "Inter" }
    code_font: { google: "JetBrains Mono" }
    font_scale: 1.05

navbar:
  structure:
    left:  [reference, articles, news, python]
    right: [search, github, lightswitch]
  components:
    python:
      text: "Python API"
      href: https://fastcpd.xingchi.li/python

reference:
  - title: Main function
    desc: >
      All implementations are unified behind `detect()`.
    contents:
      - detect
      - detect_family

  - title: Wrapper functions
    desc: >
      Simplified functions are provided for each family.

  - subtitle: Time series
    desc: >
      Family-specific convenience functions for supported time-series models.
    contents:
      - detect_ar
      - detect_arima
      - detect_arma
      - detect_garch
      - detect_var

  - subtitle: Unlabeled data
    desc: >
      Used for data without response variables, for example, mean change and
      variance change.
    contents:
      - detect_exponential
      - detect_kernel
      - detect_mean
      - detect_rank
      - detect_variance
      - detect_meanvariance

  - subtitle: Regression data
    desc: >
      Detect change points in the coefficients of regression-type data.
    contents:
      - detect_binomial
      - detect_lasso
      - detect_lm
      - detect_poisson
      - detect_quantile

  - title: Utility functions
    desc: >
      The following functions help with visualization and analyzation of the
      data.

  - subtitle: Variance estimation
    contents:
      - estimate_variance
      - estimate_variance_arma
      - estimate_variance_linear_regression
      - estimate_variance_mean
      - estimate_variance_median

  - subtitle: Class methods
    contents:
      - confint.fastcpd
      - plot.fastcpd
      - plot.fastcpd_confint
      - print.fastcpd
      - show.fastcpd
      - summary.fastcpd

  - title: Data
    desc: >
      fastcpd comes with a selection of built-in datasets that are used in
      examples to illustrate various change point detection challenges.
    contents:
    - bitcoin
    - occupancy
    - transcriptome
    - uk_seatbelts
    - well_log

  - title: Main class
    desc: >
      The results of `detect()` are stored in the class `fastcpd` with
      accompanied several utility functions.
    contents:
      - fastcpd-class

articles:
- title: Comparisons
  navbar: ~
  contents:
  - time-complexity
  - comparison-packages
  - comparison-pelt

- title: Examples
  navbar: Examples
  contents:
  - examples-advanced
  - examples-custom-model

- title: Exploration
  navbar: Exploration
  contents:
  - exploration-during-development

authors:
  Xingchi Li:
    href: https://www.xingchi.li
  Xianyang Zhang:
    href: https://zhangxiany-tamu.github.io
